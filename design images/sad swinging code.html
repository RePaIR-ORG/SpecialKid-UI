<!-- Interactive Micro-Interactions -->
<script>
        // Simple click feedback for "I'm Done"
        const doneBtn = document.querySelector('button:contains("I\'m Done")') || document.querySelectorAll('button')[1];
        if(doneBtn) {
            doneBtn.addEventListener('click', () => {
                const colors = ['#004be2', '#fdd400', '#ff9479', '#6d5a00'];
                for(let i = 0; i < 20; i++) {
                    createConfetti(colors[Math.floor(Math.random() * colors.length)]);
                }
            });
        }

        function createConfetti(color) {
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.width = '12px';
            confetti.style.height = '12px';
            confetti.style.backgroundColor = color;
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-10px';
            confetti.style.borderRadius = '2px';
            confetti.style.zIndex = '100';
            confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(confetti);

            const animation = confetti.animate([
                { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                { transform: `translate(${(Math.random() - 0.5) * 200}px, 100vh) rotate(${Math.random() * 1000}deg)`, opacity: 0 }
            ], {
                duration: 2000 + Math.random() * 3000,
                easing: 'cubic-bezier(0, .9, .57, 1)'
            });

            animation.onfinish = () => confetti.remove();
        }
    </script>
