<!-- Interactive script for subtle feel -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.bg-surface-container-lowest');
            
            // Add a subtle magnetic effect to the main card
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 100;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 100;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            // Button click sound effect (visual simulation)
            const button = document.querySelector('button.group');
            button.addEventListener('click', () => {
                confettiEffect();
            });

            function confettiEffect() {
                // This is a placeholder for a potential confetti burst interaction
                console.log('Task Completed!');
            }
        });
    </script>
