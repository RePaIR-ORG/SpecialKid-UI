        .material-symbols-outlined {

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-between overflow-x-hidden selection:bg-secondary-container">
<!-- Top Navigation (Shell Implementation) -->
<!-- Note: TopNavBar is suppressed on transactional pages as per Shell Visibility Rule, 
         but product identity is maintained through the branding on the card. -->
<main class="w-full max-w-7xl px-6 flex-grow flex items-center justify-center relative py-8">
<!-- Decorative Background Elements (The Kinetic Playhouse Style) -->
<div class="absolute top-0 left-1/4 w-96 h-96 bg-primary-container/20 blur-[100px] rounded-full -z-10"></div>
<div class="absolute bottom-0 right-1/4 w-96 h-96 bg-tertiary-fixed/20 blur-[100px] rounded-full -z-10"></div>
<!-- Registration Bento-Grid / Centered Layout -->
<div class="w-full max-w-xl">
<!-- Branding / Logo -->
<!-- Main Card Container -->
<div class="bg-surface-container-lowest p-8 md:p-16 rounded-xl shadow-[0px_40px_60px_-10px_rgba(42,43,81,0.05)] relative overflow-visible">
<!-- Editorial Image Accent -->
<div class="absolute -top-16 -right-8 hidden md:block w-32 h-32 transform rotate-12">
<img alt="Friendly 3D robot toy waving" class="w-full h-full object-contain" data-alt="A premium 3D rendered friendly white robot toy with soft blue accents, smiling and waving, high gloss finish, studio lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDRzhshZlcVCu9lScviCAjr9qwLH9XkqGpkkiMLhmg32Y61GOctWIn2lu4v3WIBTopDL0PZBfJLf4AMv-9MXMtYu_foeesI5z-YdNDqOss08YhM3WoDprOwZ4OLP3zyBmfn5HRFSU3_HdXADxo1mHSL4hEe4d8FyTTR4qinCEq8DqIoaAwlEoglNq8ZJ0XL8A4vYeb9abfai_si5iW8DZAbildrmUj8WMmerN3Dud5ALrlAe4raLr_E7v0qIi2Jz4ujGORz-HIXjZCT"/>
</div>
<!-- Header Content -->
<div class="mb-10">
<h1 class="text-4xl md:text-5xl font-extrabold text-on-surface tracking-tight leading-tight">Welcome! Set up Account</h1>
</div>
<!-- Registration Form -->
<form action="#" class="space-y-8">
<div class="space-y-6">
<!-- Username Field -->
<div class="group">
<label class="block text-sm font-bold text-on-surface-variant mb-3 ml-4" for="username">Username</label>
<div class="relative flex items-center">
<div class="absolute left-6 text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
<input class="w-full bg-surface-container-high border-none focus:ring-4 focus:ring-primary rounded-full py-5 pl-16 pr-8 text-on-surface font-medium placeholder:text-outline transition-all" id="username" placeholder="Type a cool name..." type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block text-sm font-bold text-on-surface-variant mb-3 ml-4" for="password">Password</label>
<div class="relative flex items-center">
<div class="absolute left-6 text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-high border-none focus:ring-4 focus:ring-primary rounded-full py-5 pl-16 pr-8 text-on-surface font-medium placeholder:text-outline transition-all" id="password" placeholder="Shhh... secret code!" type="password"/>
</div>
</div>
</div>
<!-- CTA Button (Bubble Button Implementation) -->
<div class="pt-4">
<button class="group w-full relative inline-flex items-center justify-center px-8 py-5 bg-primary text-on-primary font-extrabold text-xl rounded-full transition-transform active:translate-y-1 hover:-translate-y-0.5 shadow-[0px_4px_0px_0px_#0041c7]">
<span class="flex items-center gap-2">
                                Let's Go!
                                <span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</span>
</button>
</div>
<!-- Subtext -->
<div class="text-center pt-2">
<p class="text-on-surface-variant text-sm font-medium tracking-wide">
                            Don't worry, you only have to do this once!
                        </p>
</div>
</form>
</div>
<!-- Footer Meta -->
</div>
</main>
<!-- Footer Component (Shell Implementation) -->
<footer class="w-full bottom-0 bg-transparent flex flex-col md:flex-row justify-between items-center px-12 py-8 w-full gap-4">
<div class="text-[#575881] dark:text-[#a1a1c5] font-['Plus_Jakarta_Sans'] text-sm font-medium">© 2026 Secured</div>
<div class="flex gap-8">
<a class="text-[#575881] dark:text-[#a1a1c5] font-['Plus_Jakarta_Sans'] text-sm font-medium hover:text-[#2962FF] transition-all opacity-80 hover:opacity-100" href="#">Privacy</a>
<a class="text-[#575881] dark:text-[#a1a1c5] font-['Plus_Jakarta_Sans'] text-sm font-medium hover:text-[#2962FF] transition-all opacity-80 hover:opacity-100" href="#">Terms</a>
<a class="text-[#575881] dark:text-[#a1a1c5] font-['Plus_Jakarta_Sans'] text-sm font-medium hover:text-[#2962FF] transition-all opacity-80 hover:opacity-100" href="#">Support</a>
</div>
</footer>
