<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary": "#fff2ce",
                    "tertiary-dim": "#9a2100",
                    "on-primary-container": "#001b61",
                    "surface-tint": "#004be2",
                    "surface-container-high": "#e1e0ff",
                    "surface-container-low": "#f2efff",
                    "tertiary-fixed-dim": "#ff7d5c",
                    "background": "#ffffff",
                    "error": "#b41340",
                    "on-tertiary-fixed-variant": "#721600",
                    "on-primary-fixed-variant": "#002376",
                    "secondary-dim": "#5f4e00",
                    "on-surface-variant": "#575881",
                    "error-dim": "#a70138",
                    "on-secondary-container": "#594a00",
                    "tertiary-container": "#ff9479",
                    "inverse-on-surface": "#9999c6",
                    "on-error-container": "#510017",
                    "primary-dim": "#0041c7",
                    "tertiary": "#af2700",
                    "on-tertiary-fixed": "#360600",
                    "on-tertiary-container": "#621200",
                    "surface-variant": "#dbd9ff",
                    "on-primary": "#f2f1ff",
                    "surface-container": "#e8e6ff",
                    "on-secondary-fixed-variant": "#645300",
                    "on-error": "#ffefef",
                    "primary-container": "#809bff",
                    "outline-variant": "#a9a9d7",
                    "primary-fixed-dim": "#6c8cff",
                    "on-primary-fixed": "#000000",
                    "primary-fixed": "#809bff",
                    "surface-dim": "#d1d0ff",
                    "surface-container-lowest": "#ffffff",
                    "on-surface": "#2a2b51",
                    "secondary": "#6d5a00",
                    "surface": "#ffffff",
                    "on-tertiary": "#ffefec",
                    "on-secondary-fixed": "#433700",
                    "primary": "#004be2",
                    "secondary-fixed": "#fdd400",
                    "outline": "#72739e",
                    "secondary-container": "#fdd400",
                    "error-container": "#f74b6d",
                    "inverse-surface": "#08082f",
                    "surface-bright": "#ffffff",
                    "on-background": "#2a2b51",
                    "secondary-fixed-dim": "#edc600",
                    "surface-container-highest": "#dbd9ff",
                    "tertiary-fixed": "#ff9479",
                    "inverse-primary": "#6889ff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center overflow-x-hidden relative">
<!-- Robot Character: Bottom Left Corner -->
<div class="fixed bottom-4 left-4 z-10 w-32 md:w-48 lg:w-64">
<img alt="Happy Robot" class="w-full h-auto object-contain transition-transform duration-500 hover:scale-105" src="https://lh3.googleusercontent.com/aida/ADBb0ugx5NMSD3IQozFPFIOfl9kAIZtYonfia6X10wZKzYhz96Up2OC7EZO-CuOopphBvjoc1YyPlmGU5Ky1nyVRjS8dzjUzYmBhHDWHUUmjQVwXia1KEKv0ToSqkoC_ApRV4u3ZOEBokQx8aXJVeSnZIG6zYRWrvavAKu6vTRYlNVxreApYrJ_-o-ukiNC_eI2_hTuUIca9BL5mQHb8YYJwMECnOVITIu1HotXjjlOfzndMx9EU6cGoF7r2aoo"/>
</div>
<!-- Top Navigation Bar -->
<header class="w-full max-w-6xl px-8 py-10 flex flex-col items-center gap-2 relative z-20">
<h1 class="text-4xl md:text-6xl font-black text-on-surface tracking-tight text-center">
        Today I feel <span style="color: #FFD400;">Happy</span>
</h1>
</header>
<!-- Main Content Canvas: Centered -->
<main class="flex-1 w-full flex items-center justify-center px-6 pb-32 md:pb-12 relative z-20">
<div class="w-full max-w-2xl flex flex-col items-center">
<!-- Task Card: Centered Focal Point -->
<article class="w-full bg-surface-container-lowest rounded-[2.5rem] p-10 md:p-14 shadow-[0_32px_80px_rgba(42,43,81,0.12)] flex flex-col items-center gap-10">
<!-- Context & Header Row -->
<div class="flex items-center justify-center gap-6 w-full">
<div class="flex items-center gap-3 px-8 py-4 bg-secondary-container rounded-full shadow-sm">
<span class="material-symbols-outlined text-secondary text-2xl">extension</span>
<span class="text-on-secondary-container font-extrabold uppercase tracking-widest text-lg md:text-xl">Simple Puzzles</span>
</div>
<!-- Significantly Larger Speaker Icon -->
<button class="w-20 h-20 flex items-center justify-center bg-surface-container rounded-full text-secondary hover:bg-secondary-container transition-colors shadow-sm active:scale-95 shrink-0">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">volume_up</span>
</button>
</div>
<!-- Task Illustration -->
<div class="w-full aspect-[4/3] rounded-3xl overflow-hidden bg-surface-container-low border-[12px] border-surface-container">
<img alt="Colorful puzzle pieces" class="w-full h-full object-contain p-6" src="https://lh3.googleusercontent.com/aida/ADBb0ug2dNYo6Rl0mjhdkkxlZDBh4BcRzQKtN8N78FOIRNsrbMa9lsOQwkMnD800rv7ROaE88qea2UDJ3z24rQ7Rs0CF7Dbkr1d41YHVc1bw4DtK9pDZHvkvmFDSsslbor-p2gdH4yMblFBJ5-bLA9ggadik07N5pZCwjfqv83HzloYyJgzrVZF6pbfWRaEUkFnzlRc422o9cCja0SC85L3-JSSTGppU8M6UfKGnVutgBKoe5UMFln65dyCKWrVl"/>
</div>
<!-- Primary Action: Prominent Button -->
<button class="group relative w-full max-w-md bg-primary text-white text-3xl font-black py-7 px-10 rounded-full shadow-[0_8px_0_#0038a8] active:translate-y-1 active:shadow-[0_2px_0_#0038a8] transition-all flex items-center justify-center gap-4">
<span>I'm Done!</span>
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
</article>
<!-- Pagination Dots: Centered under card -->
<nav class="mt-12 flex items-center justify-center w-full gap-5">
<div class="w-5 h-5 rounded-full bg-primary shadow-[0_0_0_6px_#e1e0ff]"></div>
<div class="w-4 h-4 rounded-full bg-outline-variant"></div>
<div class="w-4 h-4 rounded-full bg-outline-variant"></div>
<div class="w-4 h-4 rounded-full bg-outline-variant"></div>
</nav>
</div>
</main>
<!-- Bottom Navigation Bar (Mobile) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-white/80 backdrop-blur-xl shadow-[0_-10px_40px_rgba(42,43,81,0.1)] rounded-t-xl md:hidden">
<!-- Play Tab -->
<a class="flex flex-col items-center justify-center text-[#575881] p-2 hover:text-[#2962FF] transition-all" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="rocket_launch">rocket_launch</span>
<span class="font-['Plus_Jakarta_Sans'] text-xs font-bold uppercase tracking-wider mt-1">Play</span>
</a>
<!-- Tasks Tab (Active) -->
<a class="flex flex-col items-center justify-center bg-[#2962FF] text-white rounded-full px-6 py-2 shadow-[0_4px_0_#004be2] translate-y-[-2px]" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="assignment">assignment</span>
<span class="font-['Plus_Jakarta_Sans'] text-xs font-bold uppercase tracking-wider mt-1">Tasks</span>
</a>
<!-- Rewards Tab -->
<a class="flex flex-col items-center justify-center text-[#575881] p-2 hover:text-[#2962FF] transition-all" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="redeem">redeem</span>
<span class="font-['Plus_Jakarta_Sans'] text-xs font-bold uppercase tracking-wider mt-1">Rewards</span>
</a>
<!-- Profile Tab -->
<a class="flex flex-col items-center justify-center text-[#575881] p-2 hover:text-[#2962FF] transition-all" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="face">face</span>
<span class="font-['Plus_Jakarta_Sans'] text-xs font-bold uppercase tracking-wider mt-1">Profile</span>
</a>
</nav>
</body></html>
