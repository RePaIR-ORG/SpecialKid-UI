<!DOCTYPE html>

<html lang="en"><head>

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bubble-shadow {
            box-shadow: 0px 4px 0px 0px rgba(42, 43, 81, 0.2);
        }
        .active-bubble-shadow {
            box-shadow: 0px 8px 0px 0px #0041c7;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col relative">
<!-- TopAppBar -->
<nav class="flex justify-between items-center px-6 py-4 w-full bg-[#f8f5ff] dark:bg-slate-950 sticky top-0 z-50">
<div class="text-2xl font-black text-[#2962FF] dark:text-blue-500 tracking-tighter">History</div>
<div class="flex gap-4 items-center invisible">
<div class="w-10 h-10"></div>
</div>
</nav>
<main class="flex-grow max-w-4xl mx-auto px-6 space-y-8 pt-8 pb-40 w-full flex flex-col items-center">
<!-- Hero Section -->
<section class="relative w-full text-center space-y-8">
<h1 class="text-4xl md:text-6xl font-black text-on-surface leading-tight tracking-tighter mx-auto max-w-2xl">
                My Top Vibe This Week
            </h1>
<div class="bg-primary-container/20 rounded-xl p-8 flex flex-col items-center justify-center overflow-hidden w-full relative">
<!-- Background Decorative Blobs -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-secondary-container/40 rounded-full blur-3xl -z-10"></div>
<div class="absolute -bottom-10 -left-10 w-48 h-48 bg-primary/20 rounded-full blur-3xl -z-10"></div>
<div class="flex flex-col md:flex-row items-center justify-center gap-4 md:gap-0">
<!-- Star-eyed Robot Image -->
<div class="w-64 h-64 md:w-80 md:h-80 relative transform hover:scale-105 transition-transform duration-500">
<img alt="Happy Star-eyed Robot" class="w-full h-full object-contain drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida/ADBb0uiiT8yjSSS3ZexSVayY5OrQGKn1FTIXDdwY86QsYyFzEcQOwJtzTdCYwKiMoPASi6eJnjhEh_u5VD7Ty7g0o6itdjRb9onFEFbU5Xwmcj4-9NvqcKp9UeUtgacEQNxTBwH9ul3t16zYPAFSwiLPhTgx8LCTiosTNNBDfYmP2S-zmv8LquZ-EQCibpJHfV6ZQz_rJGTJZ16GNpmpIn8ZPTB_9HLKxeeLDPVN8Gwe80YVywmffC4SNLlIoiQ"/>
</div>
<!-- Vibe Button -->
<div class="md:-ml-12 relative z-10">
<span class="inline-flex items-center gap-2 px-8 py-4 bg-primary text-white text-2xl md:text-4xl font-black rounded-full not-italic shadow-lg transform hover:scale-110 transition-transform cursor-default">
                            Happy! 😊
                        </span>
</div>
</div>
</div>
</section>
<!-- Mood Row: Interactive Circle Grid -->
<section class="space-y-4 flex flex-col items-center w-full mt-12">
<h2 class="text-2xl font-black text-on-surface tracking-tight text-center mb-4">Tap a day to see your mood!</h2>
<div class="flex flex-wrap md:flex-nowrap justify-center gap-4 md:gap-6 overflow-x-auto pb-4 w-full">
<!-- Monday (Expanded State Example) -->
<div class="flex flex-col items-center space-y-3 shrink-0">
<button class="w-24 h-24 md:w-28 md:h-28 rounded-full bg-green-400 border-4 border-on-primary-container flex items-center justify-center text-white active-bubble-shadow translate-y-[-4px] transition-all">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">mood</span>
</button>
<div class="text-center">
<span class="block text-xs font-black uppercase tracking-widest text-on-surface-variant">Mon</span>
<span class="text-sm font-bold text-primary">Happy</span>
</div>
</div>
<!-- Tuesday -->
<button class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-blue-400 border-4 border-on-primary-container flex items-center justify-center text-white bubble-shadow hover:translate-y-[-2px] transition-all">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">sentiment_dissatisfied</span>
</button>
<!-- Wednesday -->
<button class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-red-400 border-4 border-on-primary-container flex items-center justify-center text-white bubble-shadow hover:translate-y-[-2px] transition-all">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">mood_bad</span>
</button>
<!-- Thursday -->
<button class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-[#E0B0FF] border-4 border-on-primary-container flex items-center justify-center text-white bubble-shadow hover:translate-y-[-2px] transition-all">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">bedtime</span>
</button>
<!-- Friday -->
<button class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-green-400 border-4 border-on-primary-container flex items-center justify-center text-white bubble-shadow hover:translate-y-[-2px] transition-all">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">sentiment_very_satisfied</span>
</button>
<!-- Saturday -->
<button class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-secondary-container border-4 border-on-primary-container flex items-center justify-center text-on-secondary-container bubble-shadow hover:translate-y-[-2px] transition-all">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">celebration</span>
</button>
<!-- Sunday -->
<button class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-green-400 border-4 border-on-primary-container flex items-center justify-center text-white bubble-shadow hover:translate-y-[-2px] transition-all">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">mood</span>
</button>
</div>
</section>
</main>
<!-- BottomNavBar Pinned to Bottom -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-center items-center px-4 pb-6 pt-2 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0px_-4px_0px_0px_rgba(42,43,81,0.1)] rounded-t-[3rem] border-t-4 border-[#2962FF]">
<div class="flex justify-around items-center w-full max-w-sm">
<!-- Mood -->
<a class="flex flex-col items-center justify-center text-[#575881] dark:text-slate-400 p-2 hover:text-[#2962FF] transition-all" href="#">
<span class="material-symbols-outlined text-3xl">mood</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-[10px] uppercase tracking-widest mt-1">Mood</span>
</a>
<!-- History (Active) -->
<a class="flex flex-col items-center justify-center bg-[#2962FF] text-white rounded-full p-4 shadow-[0px_4px_0px_#004be2] translate-y-[-12px] active:translate-y-0 transition-transform duration-75" href="#">
<span class="material-symbols-outlined text-3xl">history</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-[10px] uppercase tracking-widest mt-1">History</span>
</a>
</div>
</nav>
